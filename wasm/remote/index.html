<!doctype html>
<!-- Host page for the QTAMP_WASM_REMOTE head.  Meant to be embedded as
     an iframe:  /player/?window=player|pledit&graphql=/api/music/graphql
     The wasm binary itself reads ?graphql= / ?window= / ?container=
     from location.search (see QTAMP_REMOTE_ONLY in src/main.cpp); this
     page only sizes the container to the window's native skin size so
     the frameless Qt window expands to an exact fit. -->
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, user-scalable=0"/>
    <title>qtamp remote</title>
    <style>
      html, body { padding: 0; margin: 0; overflow: hidden; height: 100%;
                   background: transparent; color: #9a9a9a;
                   font: 13px system-ui, sans-serif; }
      #screen { margin: 0 auto; }
      #qtspinner { display: flex; align-items: center; justify-content: center;
                   height: 100%; margin: 0; }
    </style>
  </head>
  <body onload="init()">
    <figure id="qtspinner"><div id="qtstatus">Loading player…</div></figure>
    <div id="screen"></div>

    <script type="text/javascript">
        // Native sizes of the containers a head can render as its root
        // (tests/regression baselines; QTAMP-WinampModernPP skin).
        const SIZES = { player: [354, 280], pledit: [436, 164],
                        playlist: [436, 164], pl: [436, 164] };

        async function init()
        {
            const spinner = document.querySelector('#qtspinner');
            const screen = document.querySelector('#screen');
            const status = document.querySelector('#qtstatus');

            const q = new URLSearchParams(location.search);
            const kind = (q.get('window') || 'player').toLowerCase();
            const [w, h] = [Number(q.get('w')) || (SIZES[kind] || SIZES.player)[0],
                            Number(q.get('h')) || (SIZES[kind] || SIZES.player)[1]];
            screen.style.width = w + 'px';
            screen.style.height = h + 'px';
            const scale = Number(q.get('scale')) || 0;
            if (scale) {
                screen.style.transformOrigin = 'top left';
                screen.style.transform = `scale(${scale})`;
            }

            const showUi = (ui) => {
                [spinner, screen].forEach(el => el.style.display = 'none');
                ui.style.display = 'block';
            }

            try {
                showUi(spinner);
                const instance = await qtLoad({
                    qt: {
                        onLoaded: () => showUi(screen),
                        onExit: exitData =>
                        {
                            status.innerHTML = 'Application exit';
                            status.innerHTML +=
                                exitData.code !== undefined ? ` with code ${exitData.code}` : '';
                            status.innerHTML +=
                                exitData.text !== undefined ? ` (${exitData.text})` : '';
                            showUi(spinner);
                        },
                        entryFunction: window.qtamp_entry,
                        containerElements: [screen],
                    }
                });
            } catch (e) {
                console.error(e);
                console.error(e.stack);
            }
        }
    </script>
    <script src="qtamp.js"></script>
    <script type="text/javascript" src="qtloader.js"></script>
  </body>
</html>
