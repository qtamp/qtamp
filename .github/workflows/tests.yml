name: tests
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt6 + build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build g++ \
            qt6-base-dev qt6-multimedia-dev qt6-declarative-dev
      - name: Configure (tests only, no engine/wasabi source needed)
        run: cmake -S . -B build -G Ninja -DQTAMP_USE_QTWASABI=OFF -DQTAMP_TESTS=ON
      - name: Build unit tests
        run: cmake --build build --target wavreader_test
      - name: Run ctest
        run: ctest --test-dir build --output-on-failure
